<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SourcePoint | Manage Events</title>
    <link rel="stylesheet" href="../css/adminevent.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/integ logo.png" alt="Logo" class="side-logo">
                <div class="brand-info">
                    <span class="brand-name">SourcePoint</span>
                    <span class="brand-tagline">Admin Panel</span>
                </div>
            </div>

            <nav class="side-nav">
                <a href="adminoverview.html" class="nav-link"><i>🏠</i> <span>Overview</span></a>
                <a href="adminevents.html" class="nav-link active"><i>📅</i> <span>Manage Events</span></a>
                <a href="admincreate.html" class="nav-link"><i>➕</i> <span>Create Event</span></a>
                <a href="adminusers.html" class="nav-link"><i>👥</i> <span>User Management</span></a>
                <a href="admincontacts.html" class="nav-link"><i>📨</i> <span>Inquiries</span></a>
                <a href="adminsms.html" class="nav-link"><i>💬</i> <span>SMS Notifications</span></a>
                <a href="submissions.html" class="nav-link"><i>📩</i> <span>Submissions</span></a>
            </nav>

            <div class="sidebar-footer">
                <a href="homepage.html" class="nav-link logout" id="logoutBtn"><i>⬅</i> <span>Sign Out</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header manage-header">
                <div class="titles">
                    <h1>Events Management</h1>
                    <p>Manage all collaborative events across Camarines Norte</p>
                </div>
                <a href="admincreate.html" class="btn-primary-action" style="text-decoration: none;">+ Create Event</a>
            </header>

            <section class="toolbar-card">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search events...">
                </div>
                <div class="filter-pills">
                    <button class="pill active" data-status="all">All</button>
                    <button class="pill" data-status="upcoming">Upcoming</button>
                    <button class="pill" data-status="ongoing">Ongoing</button>
                    <button class="pill" data-status="completed">Completed</button>
                    <button class="pill" data-status="cancelled">Cancelled</button>
                </div>
            </section>

            <div class="events-list" id="events-list">
                <p style="color: var(--text-muted);">Loading events...</p>
            </div>
        </main>
    </div>

    <!-- Edit Event Modal -->
    <div id="editModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:12px; padding:2rem; max-width:650px; width:90%; max-height:90vh; overflow-y:auto;">
            <h2 style="margin-bottom:1.5rem;">Edit Event</h2>
            <form id="editEventForm" enctype="multipart/form-data">
                <input type="hidden" id="editEventId">
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div style="grid-column:1/-1;">
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Title</label>
                        <input type="text" id="editTitle" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;" required>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Category</label>
                        <select id="editCategory" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;">
                            <option value="1">Health</option>
                            <option value="2">Training</option>
                            <option value="3">Seminar</option>
                            <option value="4">Outreach</option>
                            <option value="5">Environment</option>
                            <option value="6">Education</option>
                            <option value="7">Livelihood</option>
                        </select>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Status</label>
                        <select id="editStatus" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;">
                            <option value="upcoming">Upcoming</option>
                            <option value="ongoing">Ongoing</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Location</label>
                        <input type="text" id="editLocation" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;" required>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Event Date</label>
                        <input type="date" id="editDate" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;" required>
                    </div>
                    <div style="grid-column:1/-1;">
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Description</label>
                        <textarea id="editDescription" rows="4" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;" required></textarea>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Organizer</label>
                        <input type="text" id="editOrganizer" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;" required>
                    </div>
                    <div style="grid-column:1/-1;">
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Cover Photo</label>
                        <input type="file" id="editCoverImage" accept="image/png,image/jpeg,image/webp" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;">
                        <div id="editCoverPreview" style="display:none; margin-top:8px;">
                            <img id="editCoverPreviewImg" style="max-width:200px; border-radius:8px; border:1px solid #ddd;">
                            <button type="button" id="editRemoveCover" style="display:block; margin-top:5px; background:none; border:none; color:#e74c3c; cursor:pointer; font-size:0.85rem;">Remove</button>
                        </div>
                    </div>
                    <div style="grid-column:1/-1;">
                        <label style="display:block; margin-bottom:0.3rem; font-weight:600;">Partner Organizations (comma separated)</label>
                        <input type="text" id="editPartners" style="width:100%; padding:0.6rem; border:1px solid #ddd; border-radius:6px;">
                    </div>
                    <div style="grid-column:1/-1; display:flex; align-items:center; gap:8px; margin-top:8px;">
                        <input type="checkbox" id="editSendSMS" style="width:16px; height:16px; cursor:pointer;">
                        <label for="editSendSMS" style="font-weight:600; cursor:pointer; user-select:none;">Notify all registered participants via SMS</label>
                    </div>
                </div>

                <div id="editFormMsg" style="display:none; margin-top:1rem; padding:0.75rem; border-radius:8px;"></div>

                <div style="margin-top:1.5rem; display:flex; gap:10px; justify-content:flex-end;">
                    <button type="button" onclick="document.getElementById('editModal').style.display='none'" style="padding:0.6rem 1.2rem; background:#eee; border:none; border-radius:6px; cursor:pointer;">Cancel</button>
                    <button type="submit" style="padding:0.6rem 1.2rem; background:#3498db; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentStatusFilter = 'all';

        // =============================================
        // Load Events
        // =============================================
        async function loadEvents() {
            const container = document.getElementById('events-list');
            container.innerHTML = '<p style="color: var(--text-muted);">Loading events...</p>';
            
            try {
                const response = await fetch('../api/events.php?status=all&limit=100');
                const result = await response.json();

                if (result.success && result.events.length > 0) {
                    container.innerHTML = '';
                    result.events.forEach(event => {
                        const eventDate = new Date(event.event_date);
                        const formattedDate = eventDate.toLocaleDateString('en-PH', {
                            month: 'long', day: 'numeric', year: 'numeric'
                        });

                        const statusClass = event.status === 'upcoming' ? 'badge-upcoming' : 
                                            event.status === 'completed' ? 'badge-completed' :
                                            event.status === 'ongoing' ? 'badge-ongoing' : 'badge-cancelled';

                        const row = document.createElement('div');
                        row.className = 'event-row-card';
                        row.dataset.status = event.status;
                        
                        const coverPath = event.cover_image ? `../${event.cover_image}` : '';
                        const coverHtml = coverPath 
                            ? `<div class="card-image-wrapper"><img src="${coverPath}" alt="${event.title}" class="event-cover" loading="lazy"></div>`
                            : `<div class="card-image-wrapper card-image-placeholder"><i class="fa-solid fa-calendar-days"></i></div>`;

                        row.innerHTML = `
                            ${coverHtml}
                            <div class="event-main-info">
                                <h3>${event.title}</h3>
                                <div class="meta-row">
                                    <span><i class="fa-regular fa-calendar"></i> ${formattedDate}</span>
                                    <span><i class="fa-solid fa-location-dot"></i> ${event.location}</span>
                                </div>
                                <div class="tag-row">
                                    <span class="tag tag-category">${event.category_name || 'General'}</span>
                                    <span class="tag tag-organizer"><i class="fa-solid fa-building"></i> ${event.organizer}</span>
                                </div>
                                ${event.partner_organizations ? `
                                <div class="partner-tags">
                                    <span class="partner-label"><i class="fa-solid fa-handshake"></i> Partners:</span>
                                    ${event.partner_organizations.split(',').map(p => `<span class="tag tag-partner">${p.trim()}</span>`).join('')}
                                </div>` : ''}
                            </div>
                            <div class="event-status-actions">
                                <span class="badge ${statusClass}">${event.status}</span>
                                <div class="action-buttons">
                                    <button class="btn-edit" data-id="${event.id}" 
                                        data-title='${event.title.replace(/'/g, "&#39;")}'
                                        data-desc='${event.description.replace(/'/g, "&#39;")}'
                                        data-category='${event.category_id || ''}'
                                        data-location='${event.location.replace(/'/g, "&#39;")}'
                                        data-date='${event.event_date}'
                                        data-organizer='${event.organizer.replace(/'/g, "&#39;")}'
                                        data-cover='${(event.cover_image || "").replace(/'/g, "&#39;")}'
                                        data-partners='${(event.partner_organizations || "").replace(/'/g, "&#39;")}'
                                        data-status='${event.status}'><i class="fa-solid fa-pen"></i> Edit</button>
                                    <button class="btn-delete" data-id="${event.id}"><i class="fa-solid fa-trash"></i> Delete</button>
                                </div>
                            </div>
                        `;
                        container.appendChild(row);
                    });

                    // Add edit event listeners
                    document.querySelectorAll('.btn-edit').forEach(btn => {
                        btn.addEventListener('click', function() {
                            openEditModal({
                                id: this.dataset.id,
                                title: this.dataset.title,
                                description: this.dataset.desc,
                                category_id: this.dataset.category,
                                location: this.dataset.location,
                                event_date: this.dataset.date,
                                organizer: this.dataset.organizer,
                                cover_image: this.dataset.cover,
                                partner_organizations: this.dataset.partners,
                                status: this.dataset.status
                            });
                        });
                    });

                    // Add delete event listeners
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', async function() {
                            const eventId = this.dataset.id;
                            if (confirm('Are you sure you want to delete this event?')) {
                                try {
                                    const res = await fetch('../api/events.php', {
                                        method: 'DELETE',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ id: eventId })
                                    });
                                    const data = await res.json();
                                    if (data.success) {
                                        loadEvents();
                                    } else {
                                        alert('Error: ' + data.message);
                                    }
                                } catch (error) {
                                    alert('Connection error');
                                }
                            }
                        });
                    });

                    applyStatusFilter();
                } else if (result.success && result.events.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-muted);">No events found. Create one!</p>';
                } else {
                    container.innerHTML = '<p style="color: var(--text-muted);">Failed to load events.</p>';
                }
            } catch (error) {
                document.getElementById('events-list').innerHTML = '<p style="color: var(--text-muted);">Connection error.</p>';
            }
        }

        // =============================================
        // Open Edit Modal
        // =============================================
        function openEditModal(event) {
            document.getElementById('editEventId').value = event.id;
            document.getElementById('editTitle').value = event.title;
            document.getElementById('editDescription').value = event.description;
            document.getElementById('editCategory').value = event.category_id || '1';
            document.getElementById('editLocation').value = event.location;
            document.getElementById('editDate').value = event.event_date;
            document.getElementById('editOrganizer').value = event.organizer;
            document.getElementById('editPartners').value = event.partner_organizations;
            document.getElementById('editStatus').value = event.status || 'upcoming';
            // Reset cover file input
            document.getElementById('editCoverImage').value = '';
            // Show existing cover preview if available
            if (event.cover_image) {
                document.getElementById('editCoverPreviewImg').src = '../' + event.cover_image;
                document.getElementById('editCoverPreview').style.display = 'block';
            } else {
                document.getElementById('editCoverPreview').style.display = 'none';
            }
            document.getElementById('editSendSMS').checked = false;
            document.getElementById('editFormMsg').style.display = 'none';
            document.getElementById('editModal').style.display = 'flex';
        }

        // =============================================
        // Edit cover image preview (file selected)
        // =============================================
        document.getElementById('editCoverImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('editCoverPreviewImg').src = ev.target.result;
                    document.getElementById('editCoverPreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('editRemoveCover').addEventListener('click', function() {
            document.getElementById('editCoverImage').value = '';
            document.getElementById('editCoverPreview').style.display = 'none';
        });

        // =============================================
        // Save Event Edit (using FormData for file upload)
        // =============================================
        document.getElementById('editEventForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msgBox = document.getElementById('editFormMsg');
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Saving...';
            submitBtn.disabled = true;
            msgBox.style.display = 'none';

            const eventId = document.getElementById('editEventId').value;
                const formData = new FormData();
            formData.append('_method', 'PUT');
            formData.append('id', parseInt(eventId));
            formData.append('title', document.getElementById('editTitle').value);
            formData.append('description', document.getElementById('editDescription').value);
            formData.append('category_id', parseInt(document.getElementById('editCategory').value));
            formData.append('location', document.getElementById('editLocation').value);
            formData.append('event_date', document.getElementById('editDate').value);
            formData.append('organizer', document.getElementById('editOrganizer').value);
            formData.append('partner_organizations', document.getElementById('editPartners').value);
            formData.append('status', document.getElementById('editStatus').value);

            formData.append('send_sms', document.getElementById('editSendSMS').checked ? 'true' : 'false');

            const editCover = document.getElementById('editCoverImage').files[0];
            if (editCover) {
                formData.append('cover_image', editCover);
            }

            try {
                const res = await fetch('../api/events.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();

                if (result.success) {
                    msgBox.style.cssText = 'display:block; background:#d4edda; color:#155724; padding:0.75rem; border-radius:8px;';
                    msgBox.textContent = '✅ Event updated successfully!';
                    setTimeout(() => {
                        document.getElementById('editModal').style.display = 'none';
                        loadEvents();
                    }, 1000);
                } else {
                    msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; padding:0.75rem; border-radius:8px;';
                    msgBox.textContent = '❌ ' + result.message;
                }
            } catch (error) {
                msgBox.style.cssText = 'display:block; background:#f8d7da; color:#721c24; padding:0.75rem; border-radius:8px;';
                msgBox.textContent = '❌ Connection error';
            } finally {
                submitBtn.textContent = 'Save Changes';
                submitBtn.disabled = false;
            }
        });

        // =============================================
        // Status Filter
        // =============================================
        function applyStatusFilter() {
            const cards = document.querySelectorAll('.event-row-card');
            cards.forEach(card => {
                if (currentStatusFilter === 'all' || card.dataset.status === currentStatusFilter) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        document.querySelectorAll('.filter-pills .pill').forEach(pill => {
            pill.addEventListener('click', function() {
                document.querySelectorAll('.filter-pills .pill').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                currentStatusFilter = this.dataset.status;
                applyStatusFilter();
            });
        });

        // =============================================
        // Search
        // =============================================
        document.getElementById('searchInput').addEventListener('input', function() {
            const q = this.value.toLowerCase();
            const cards = document.querySelectorAll('.event-row-card');
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(q) ? '' : 'none';
            });
        });

        // =============================================
        // Logout
        // =============================================
        document.getElementById('logoutBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            try {
                await fetch('../api/logout.php', { method: 'POST' });
                window.location.href = 'homepage.html';
            } catch (error) {
                window.location.href = 'homepage.html';
            }
        });

        // =============================================
        // Initialize
        // =============================================
        document.addEventListener('DOMContentLoaded', loadEvents);
    </script>
</body>
</html>
