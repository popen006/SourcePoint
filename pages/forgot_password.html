<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SourcePoint | Forgot Password</title>
    <link rel="stylesheet" href="../css/residentlogin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo-group">
                <img src="../assets/integ logo.png" alt="SourcePoint Logo" class="nav-logo">
                <div class="brand-info">
                    <span class="brand-name">SourcePoint</span>
                    <span class="brand-tagline">CamNorte Event Aggregator</span>
                </div>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="homepage.html" class="nav-item">Home</a>
                <a href="camnews.html" class="nav-item">News</a>
                <a href="about.html" class="nav-item">About</a>
                <a href="contact.html" class="nav-item">Contact</a>
                <span id="navUserDisplay" style="display:none; align-items:center; gap:15px;">
                    <a href="profile.html" class="nav-item" id="userGreeting" style="cursor:pointer; text-decoration:none;"></a>
                    <a href="#" id="logoutLink" class="nav-btn-signup">Log Out</a>
                </span>
                <a href="signup.html" id="signupLink" class="nav-btn-signup">Sign Up</a>
                <a href="residentlogin.html" id="loginLink" class="nav-btn-login">Log In</a>
            </div>

            <div class="mobile-menu-icon">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <main class="signup-wrapper">
        <div class="signup-card">
            <div class="card-header">
                <div class="icon-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <h1>Reset Password</h1>
                <p id="stepDescription">Enter your mobile number to receive a verification code via SMS.</p>
            </div>

            <form class="signup-form" id="resetForm">
                <div id="step1">
                    <div class="input-group">
                        <label for="mobile">Mobile Number</label>
                        <input type="tel" id="mobile" placeholder="e.g. 09123456789" autocomplete="off" required>
                    </div>
                    <button type="submit" class="btn-primary" id="sendCodeBtn">Send Verification Code</button>
                </div>

                <div id="step2" style="display:none;">
                    <div class="input-group">
                        <label for="code">Verification Code</label>
                        <input type="text" id="code" placeholder="Enter 6-digit code" maxlength="6" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <label for="newPassword">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="newPassword" placeholder="At least 6 characters" autocomplete="new-password" required minlength="6">
                            <span class="toggle-pw" onclick="togglePassword('newPassword', this)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </span>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Re-enter new password" autocomplete="new-password" required minlength="6">
                            <span class="toggle-pw" onclick="togglePassword('confirmPassword', this)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>
                    <p style="margin-top:1rem; font-size:0.85rem; color:#888;">
                        <a href="#" id="backToStep1" style="color:#e94560;">← Back to mobile entry</a>
                    </p>
                </div>
            </form>

            <div id="formMsg" style="display:none; margin-top:1rem; padding:0.75rem; border-radius:8px; font-size:0.9rem;"></div>

            <p class="login-prompt" style="margin-top:1rem;">
                Remember your password? <a href="residentlogin.html">Log In</a>
            </p>
        </div>
    </main>

    <script>
        // =============================================
        // Check Login Status & Update Nav
        // =============================================
        async function checkLoginStatus() {
            try {
                const response = await fetch('../api/check_session.php');
                const result = await response.json();
                
                if (result.logged_in) {
                    document.getElementById('loginLink').style.display = 'none';
                    document.getElementById('signupLink').style.display = 'none';
                    const display = document.getElementById('navUserDisplay');
                    display.style.display = 'flex';
                    document.getElementById('userGreeting').textContent = '👋 ' + (result.user?.name || result.admin?.name || 'User');
                } else {
                    document.getElementById('loginLink').style.display = '';
                    document.getElementById('signupLink').style.display = '';
                    document.getElementById('navUserDisplay').style.display = 'none';
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }

        document.getElementById('logoutLink').addEventListener('click', async function(e) {
            e.preventDefault();
            try {
                await fetch('../api/logout.php', { method: 'POST' });
                window.location.reload();
            } catch (error) {
                window.location.reload();
            }
        });

        // =============================================
        // Mobile Menu Toggle
        // =============================================
        const mobileMenuIcon = document.querySelector('.mobile-menu-icon');
        const navLinks = document.getElementById('navLinks');

        if (mobileMenuIcon) {
            mobileMenuIcon.addEventListener('click', function() {
                this.classList.toggle('active');
                navLinks.classList.toggle('mobile-open');
            });

            navLinks.querySelectorAll('.nav-item, .nav-btn-signup, .nav-btn-login').forEach(link => {
                link.addEventListener('click', function() {
                    mobileMenuIcon.classList.remove('active');
                    navLinks.classList.remove('mobile-open');
                });
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.navbar')) {
                    mobileMenuIcon.classList.remove('active');
                    navLinks.classList.remove('mobile-open');
                }
            });
        }

        const resetForm = document.getElementById('resetForm');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const stepDescription = document.getElementById('stepDescription');
        const formMsg = document.getElementById('formMsg');
        let currentMobile = '';

        function showMsg(type, text) {
            formMsg.style.display = 'block';
            formMsg.style.cssText = `display:block; padding:0.75rem; border-radius:8px; margin-top:1rem; font-size:0.9rem; ${
                type === 'success' ? 'background:#d4edda; color:#155724;' : 'background:#f8d7da; color:#721c24;'
            }`;
            formMsg.textContent = text;
        }

        // Step 1: Request code
        document.getElementById('sendCodeBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            const mobile = document.getElementById('mobile').value.trim();
            if (!mobile) {
                showMsg('error', 'Please enter your mobile number.');
                return;
            }

            this.textContent = 'Sending SMS...';
            this.disabled = true;
            formMsg.style.display = 'none';

            try {
                const res = await fetch('../api/forgot_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ step: 'request', mobile: mobile })
                });
                const data = await res.json();

                if (data.success) {
                    currentMobile = mobile;
                    step1.style.display = 'none';
                    step2.style.display = 'block';
                    stepDescription.textContent = 'Enter the 6-digit code sent to your phone.';
                    showMsg('success', 'Verification code sent via SMS!');
                } else {
                    showMsg('error', data.message);
                }
            } catch (e) {
                showMsg('error', 'Connection error. Please try again.');
            } finally {
                this.textContent = 'Send Verification Code';
                this.disabled = false;
            }
        });

        // Step 2: Reset password
        document.getElementById('resetBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            const code = document.getElementById('code').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!code || code.length !== 6) {
                showMsg('error', 'Please enter a valid 6-digit verification code.');
                return;
            }
            if (newPassword.length < 6) {
                showMsg('error', 'Password must be at least 6 characters.');
                return;
            }
            if (newPassword !== confirmPassword) {
                showMsg('error', 'Passwords do not match!');
                return;
            }

            this.textContent = 'Resetting...';
            this.disabled = true;
            formMsg.style.display = 'none';

            try {
                const res = await fetch('../api/forgot_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        step: 'reset', 
                        mobile: currentMobile,
                        code: code,
                        new_password: newPassword
                    })
                });
                const data = await res.json();

                if (data.success) {
                    showMsg('success', '✅ Password reset successfully! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = 'residentlogin.html';
                    }, 2000);
                } else {
                    showMsg('error', data.message);
                }
            } catch (e) {
                showMsg('error', 'Connection error. Please try again.');
            } finally {
                this.textContent = 'Reset Password';
                this.disabled = false;
            }
        });

        // Back to step 1
        document.getElementById('backToStep1').addEventListener('click', function(e) {
            e.preventDefault();
            step2.style.display = 'none';
            step1.style.display = 'block';
            stepDescription.textContent = 'Enter your mobile number to receive a verification code via SMS.';
            formMsg.style.display = 'none';
        });
    </script>

    <style>
        .password-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        .password-wrapper input[type="password"], .password-wrapper input[type="text"] { width: 100% !important; padding-right: 40px !important; box-sizing: border-box; }
        .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; display: flex; align-items: center; padding: 4px; border-radius: 4px; transition: color 0.2s; z-index: 2; background: transparent; }
        .toggle-pw:hover { color: #333; }
    </style>
    <script>
        function togglePassword(inputId, toggleEl) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            toggleEl.innerHTML = isPassword
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }
    </script>

</body>
</html>
