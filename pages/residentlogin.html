<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SourcePoint | Resident Login</title>
    <link rel="stylesheet" href="../css/residentlogin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo-group">
                <img src="../assets/integ logo.png" alt="SourcePoint Logo" class="nav-logo">
                <div class="brand-info">
                    <span class="brand-name">SourcePoint</span>
                    <span class="brand-tagline">CamNorte Event Aggregator</span>
                </div>
            </div>

            <div class="nav-links" id="navLinks">
                <a href="homepage.html" class="nav-item">Home</a>
                <a href="camnews.html" class="nav-item">News</a>
                <a href="about.html" class="nav-item">About</a>
                <a href="contact.html" class="nav-item">Contact</a>
                <span id="navUserDisplay" style="display:none; align-items:center; gap:15px;">
                    <a href="profile.html" class="nav-item" id="userGreeting" style="cursor:pointer; text-decoration:none;"></a>
                    <a href="#" id="logoutLink" class="nav-btn-signup">Log Out</a>
                </span>
                <a href="signup.html" id="signupLink" class="nav-btn-signup">Sign Up</a>
                <a href="residentlogin.html" id="loginLink" class="nav-btn-login">Log In</a>
            </div>

            <div class="mobile-menu-icon">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <main class="signup-wrapper">
        <div class="signup-card">
            <div class="card-header">
                <div class="icon-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h1>Resident Login</h1>
                <p>Welcome back to the community hub</p>
            </div>

            <form class="signup-form" id="residentLoginForm" autocomplete="off">
                <div class="input-group">
                    <label for="email">Email or Username</label>
                    <input type="text" id="email" placeholder="Enter your email or username" autocomplete="off" required>
                </div>

                <div class="input-group">
                    <div style="display: flex; justify-content: space-between;">
                        <label for="password">Password</label>
                        <a href="forgot_password.html" style="font-size: 0.75rem; color: #D35400; text-decoration: none; font-weight: 700;">Forgot?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required>
                        <span class="toggle-pw" onclick="togglePassword('password', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Login
                </button>
            </form>

            <p class="login-prompt">
                Don't have an account? <a href="signup.html">Create Account</a>
            </p>
            <p class="login-prompt" style="margin-top: 0.5rem; text-align: center; font-size: 0.85rem;">
                Are you an admin? <a href="adminlogin.html" style="color: #D35400; font-weight: 700;">Admin Portal →</a>
            </p>
        </div>
    </main>

    <script>
        // =============================================
        // Check Login Status & Update Nav
        // =============================================
        async function checkLoginStatus() {
            try {
                const response = await fetch('../api/check_session.php');
                const result = await response.json();
                
                if (result.logged_in) {
                    document.getElementById('loginLink').style.display = 'none';
                    document.getElementById('signupLink').style.display = 'none';
                    const display = document.getElementById('navUserDisplay');
                    display.style.display = 'flex';
                    document.getElementById('userGreeting').textContent = '👋 ' + (result.user?.name || result.admin?.name || 'User');
                } else {
                    document.getElementById('loginLink').style.display = '';
                    document.getElementById('signupLink').style.display = '';
                    document.getElementById('navUserDisplay').style.display = 'none';
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }

        // =============================================
        // Mobile Menu Toggle
        // =============================================
        const mobileMenuIcon = document.querySelector('.mobile-menu-icon');
        const navLinks = document.getElementById('navLinks');

        if (mobileMenuIcon) {
            mobileMenuIcon.addEventListener('click', function() {
                this.classList.toggle('active');
                navLinks.classList.toggle('mobile-open');
            });

            navLinks.querySelectorAll('.nav-item, .nav-btn-signup, .nav-btn-login').forEach(link => {
                link.addEventListener('click', function() {
                    mobileMenuIcon.classList.remove('active');
                    navLinks.classList.remove('mobile-open');
                });
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.navbar')) {
                    mobileMenuIcon.classList.remove('active');
                    navLinks.classList.remove('mobile-open');
                }
            });
        }

        // =============================================
        // Logout
        // =============================================
        document.getElementById('logoutLink').addEventListener('click', async function(e) {
            e.preventDefault();
            try {
                await fetch('../api/logout.php', { method: 'POST' });
                window.location.reload();
            } catch (error) {
                window.location.reload();
            }
        });

        const loginForm = document.getElementById('residentLoginForm');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = this.querySelector('.btn-primary');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Logging in...';
            submitBtn.disabled = true;

            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = 'homepage.html';
                } else {
                    // Clear fields on wrong credentials
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    alert('Incorrect email/username or password. Please try again.');
                }
            } catch (error) {
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                alert('Connection error. Please try again.');
                console.error('Login error:', error);
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // Initialize login check
        document.addEventListener('DOMContentLoaded', checkLoginStatus);
    </script>

    <style>
        .password-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        .password-wrapper input[type="password"], .password-wrapper input[type="text"] { width: 100% !important; padding-right: 40px !important; box-sizing: border-box; }
        .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; display: flex; align-items: center; padding: 4px; border-radius: 4px; transition: color 0.2s; z-index: 2; background: transparent; }
        .toggle-pw:hover { color: #333; }
    </style>
    <script>
        function togglePassword(inputId, toggleEl) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            toggleEl.innerHTML = isPassword
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }
    </script>

</body>
</html>
